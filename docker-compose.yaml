services:
  postgresql:
    image: postgres:18
    container_name: postgresql
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: verificatieservice
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d verificatieservice" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
